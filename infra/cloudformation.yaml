AWSTemplateFormatVersion: '2010-09-09'
Description: EcoSphere OS - ESG Management Platform (Hackathon Deployment)

Parameters:
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance type
  KeyPairName:
    Type: String
    Default: ''
    Description: EC2 key pair name for SSH access (optional)
  JwtSecret:
    Type: String
    NoEcho: true
    Default: ecosphere-hackathon-jwt-secret-2026
    Description: JWT signing secret

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: ecosphere-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: ecosphere-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: ecosphere-public-subnet

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: ecosphere-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EcoSphere application security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: ecosphere-sg

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: ecosphere-instance-role

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref 'AWS::NoValue']
      Tags:
        - Key: Name
          Value: ecosphere-server
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          yum update -y
          
          # Install Node.js 20
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          yum install -y nodejs git
          
          # Install nginx as reverse proxy
          amazon-linux-extras install nginx1 -y || yum install -y nginx
          
          # Clone and build the app
          cd /opt
          git clone https://github.com/ecosphere-hackathon/EcoSphere_OS.git app || mkdir -p app
          cd app
          
          # Create backend .env
          cat > /opt/app/.env <<'ENVFILE'
          PORT=4000
          CLIENT_ORIGIN=*
          JWT_SECRET=${JwtSecret}
          ACCESS_TOKEN_EXPIRES_IN=15m
          REFRESH_TOKEN_TTL_DAYS=7
          BCRYPT_ROUNDS=10
          DEMO_EMAIL=demo@ecosphere.com
          DEMO_PASSWORD=EcoSphere@2024
          NODE_ENV=production
          ENVFILE
          
          # Setup app directory structure (for manual deploy via scp/rsync)
          mkdir -p /opt/app/public
          
          # Create systemd service
          cat > /etc/systemd/system/ecosphere.service <<'SYSTEMD'
          [Unit]
          Description=EcoSphere ESG Platform
          After=network.target
          
          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/opt/app
          EnvironmentFile=/opt/app/.env
          ExecStart=/usr/bin/node src/server.js
          Restart=on-failure
          RestartSec=10
          StandardOutput=syslog
          StandardError=syslog
          SyslogIdentifier=ecosphere
          
          [Install]
          WantedBy=multi-user.target
          SYSTEMD
          
          # Nginx config
          cat > /etc/nginx/conf.d/ecosphere.conf <<'NGINX'
          server {
              listen 80;
              server_name _;
              
              location / {
                  proxy_pass http://127.0.0.1:4000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          NGINX
          
          # Remove default nginx config
          rm -f /etc/nginx/conf.d/default.conf
          sed -i '/server {/,/}/d' /etc/nginx/nginx.conf 2>/dev/null || true
          
          # Set permissions
          chown -R ec2-user:ec2-user /opt/app
          
          # Start services
          systemctl enable nginx
          systemctl start nginx
          systemctl enable ecosphere
          
          # Signal completion
          echo "EcoSphere deployment ready" > /opt/app/deploy-status.txt

Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-east-2:
      AMI: ami-089a545a9ed9893b6
    us-west-1:
      AMI: ami-04b6c97b14c54de18
    us-west-2:
      AMI: ami-0ceecbb0f30a902a6
    eu-west-1:
      AMI: ami-0d71ea30463e0ff8d
    eu-central-1:
      AMI: ami-0c956e207f9d113d5
    ap-south-1:
      AMI: ami-0f5ee92e2d63afc18
    ap-southeast-1:
      AMI: ami-0b89f7b3f054b957e

Outputs:
  PublicIP:
    Description: Public IP of the EcoSphere server
    Value: !GetAtt EC2Instance.PublicIp
  PublicURL:
    Description: Application URL
    Value: !Sub 'http://${EC2Instance.PublicIp}'
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance
